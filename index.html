<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOVAT Inc.</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .logo {
      width: 120px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 14px;
      letter-spacing: 4px;
      color: #666;
      margin-bottom: 12px;
    }

    h2 {
      font-size: 32px;
      margin: 0 0 32px;
    }

    .kv {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 24px;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
    }

    p {
      font-size: 16px;
      line-height: 1.8;
      margin-top: 32px;
    }

    @media (min-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- ロゴ -->
    <img src="enso.PNG" alt="SOVAT Logo" class="logo">

    <!-- タイトル -->
    <h1>CURRENT PROJECT</h1>
    <h2>Suffiness</h2>

    <!-- メインビジュアル -->
    <img src="assets/images/suffiness-kv-01.PNG" class="kv" alt="Suffiness Key Visual">

    <!-- サブビジュアル -->
    <div class="gallery">
      <img src="assets/images/suffiness-kv-02.PNG" alt="">
      <img src="assets/images/suffiness-kv-03.PNG" alt="">
    </div>

    <!-- コピー -->
    <p>
      波乗りの感覚を、触覚で呼び戻す。<br>
      スマートフォンの振動を使った触覚エンターテインメント。
    </p>

  </div>
</body>
</html>
